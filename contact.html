<article class="legal contact-page">
  <p class="kicker">DreamWave Journal</p>
  <h1>Contact</h1>
  <p class="lead">
    Questions, feedback, or a story from the other side of sleep —
    we read everything. Messages go to contact@dreamwavejournal.com.
  </p>

  <form class="contact-form" action="https://formsubmit.co/c18e7708b39464579b8b160c17ec8ebc" method="POST">
    <!-- FormSubmit settings -->
    <input type="hidden" name="_subject" value="New message from dreamwavejournal website" />
    <input type="hidden" name="_next" value="https://erinsarita.github.io/dreamwave-website/thanks.html" />
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_template" value="table" />
    <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

    <label>
      Your name
      <input type="text" name="name" required autocomplete="name" />
    </label>
    <label>
      Your email
      <input type="email" name="email" required autocomplete="email" />
    </label>
    <label>
      Message
      <textarea name="message" rows="7" required></textarea>
    </label>
    <button type="submit" class="btn-solid">Send message</button>
  </form>
</article>
